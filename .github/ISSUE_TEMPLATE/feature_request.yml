name: Feature request
description: Propose a scoped improvement.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, operator, or protocol problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - TascLang
        - EVM settlement
        - Solana settlement
        - Scanner / indexer
        - Verifier
        - Static web demo
        - Docs / onboarding
        - Security
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: How would we prove this works?
