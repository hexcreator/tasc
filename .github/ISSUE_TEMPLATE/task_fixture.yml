name: Task fixture
description: Suggest a new TascLang task example.
title: "[task] "
labels: ["task-fixture", "good first issue"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task idea
      description: What should a worker do in 60 seconds or less?
    validations:
      required: true
  - type: input
    id: reward
    attributes:
      label: Target reward
      placeholder: "10 USDC"
    validations:
      required: true
  - type: textarea
    id: inputs
    attributes:
      label: Inputs
      description: What inputs does the task need?
  - type: textarea
    id: verification
    attributes:
      label: Verification rules
      description: How can completion be checked deterministically?
    validations:
      required: true
  - type: textarea
    id: abuse
    attributes:
      label: Abuse considerations
      description: How could this task be spammed, faked, or made unsafe?
