<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tasc settlement flow</title>
  <desc id="desc">Settlement flow from buyer funded task to worker payout or buyer refund.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#091613"/>
      <stop offset="1" stop-color="#141A19"/>
    </linearGradient>
    <style>
      .h { font: 760 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #F4FFF9; }
      .p { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #B9D7CE; }
      .n { fill: #102520; stroke: #2D5B50; stroke-width: 1.5; }
      .blue { fill: #10222B; stroke: #2C5D77; stroke-width: 1.5; }
      .gold { fill: #2A2414; stroke: #7C6126; stroke-width: 1.5; }
      .arrow { stroke: #78948B; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>
  <rect width="1120" height="360" rx="24" fill="url(#bg)"/>
  <text x="54" y="62" class="h" font-size="28">Settlement Modes</text>
  <text x="54" y="91" class="p">Current proof covers funded custody; next implementation completes claim, attestation, and payout.</text>
  <g>
    <rect x="54" y="142" width="170" height="96" rx="12" class="n"/>
    <text x="82" y="181" class="h">Fund</text>
    <text x="82" y="209" class="p">Signed intent + vault</text>
  </g>
  <path d="M224 190H286M275 178L287 190L275 202" class="arrow"/>
  <g>
    <rect x="286" y="142" width="170" height="96" rx="12" class="blue"/>
    <text x="314" y="181" class="h">Admit</text>
    <text x="314" y="209" class="p">Scanner proves funded</text>
  </g>
  <path d="M456 190H518M507 178L519 190L507 202" class="arrow"/>
  <g>
    <rect x="518" y="142" width="170" height="96" rx="12" class="blue"/>
    <text x="546" y="181" class="h">Claim</text>
    <text x="546" y="209" class="p">Worker locks task</text>
  </g>
  <path d="M688 190H750M739 178L751 190L739 202" class="arrow"/>
  <g>
    <rect x="750" y="142" width="170" height="96" rx="12" class="gold"/>
    <text x="778" y="181" class="h">Verify</text>
    <text x="778" y="209" class="p">Pass or fail result</text>
  </g>
  <path d="M920 190H982M971 178L983 190L971 202" class="arrow"/>
  <g>
    <rect x="982" y="142" width="84" height="96" rx="12" class="gold"/>
    <text x="1001" y="181" class="h">Pay</text>
    <text x="1001" y="209" class="p">or refund</text>
  </g>
  <path d="M835 238V283H139V238" stroke="#3D5951" stroke-width="2" stroke-linecap="round"/>
  <text x="374" y="315" class="p">timeouts and disputes loop through refund or reviewer resolution</text>
</svg>
