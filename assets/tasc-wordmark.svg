<svg width="960" height="240" viewBox="0 0 960 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tasc wordmark</title>
  <desc id="desc">A compact wordmark for the Tasc protocol, showing funded work moving through verification into payout.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071512"/>
      <stop offset="0.54" stop-color="#0E2B26"/>
      <stop offset="1" stop-color="#16201E"/>
    </linearGradient>
    <linearGradient id="line" x1="94" y1="120" x2="338" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#45E0B8"/>
      <stop offset="0.52" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#F8C35B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-40%" width="140%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>
  <rect width="960" height="240" rx="24" fill="url(#bg)"/>
  <path d="M52 48H908V192H52V48Z" fill="#E8FFF6" fill-opacity="0.03"/>
  <g filter="url(#soft)">
    <path d="M96 120H336" stroke="url(#line)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="96" cy="120" r="34" fill="#0D332D" stroke="#45E0B8" stroke-width="6"/>
    <circle cx="216" cy="120" r="34" fill="#0D2533" stroke="#7DD3FC" stroke-width="6"/>
    <circle cx="336" cy="120" r="34" fill="#342816" stroke="#F8C35B" stroke-width="6"/>
    <path d="M82 120L94 132L113 108" stroke="#E8FFF6" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M202 120H230M216 106V134" stroke="#E8FFF6" stroke-width="8" stroke-linecap="round"/>
    <path d="M322 132L336 104L350 132H322Z" fill="#E8FFF6"/>
  </g>
  <text x="406" y="116" fill="#F4FFF9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="760">Tasc</text>
  <text x="410" y="154" fill="#B9D7CE" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="500">pre-funded micro-work, verifiable settlement</text>
  <text x="724" y="154" fill="#F8C35B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700">$10 / 60s target</text>
</svg>
